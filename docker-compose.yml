services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pingdan
      POSTGRES_PASSWORD: pingdan
      POSTGRES_DB: pingdan
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pingdan"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:

